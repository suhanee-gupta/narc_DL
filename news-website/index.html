<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <title>The Margin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #FFFFFF; }
      body { 
        font-family: 'Inter', system-ui, sans-serif; 
        color: #111;
        overflow-x: hidden; /* Prevents layout shifting when drawer opens */
      }
      ::selection { background: #111; color: #fff; }

      /* Custom Range Input Styling for Personalization Drawer */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-runnable-track {
        background: #111;
        height: 1px;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        background: #C21E3B;
        border-radius: 50%;
        margin-top: -8px; /* Centers thumb on track */
      }

      /* Animations used by Claude for content re-ranking */
      @keyframes fadeIn {
        from { opacity: 0.3; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .animate-news-fade {
        animation: fadeIn 0.5s ease-out forwards;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
